vocabulary:
  - term: namespace
    definition: >-
      A unique identifier assigned to a Testmail account that acts as a
      collection of programmable mailboxes. All email addresses in a namespace
      follow the pattern {namespace}.{tag}@inbox.testmail.app. Namespaces are
      obtained from the Testmail developer console and serve as the primary
      authorization scope for API access.
    tags:
      - core
      - routing

  - term: tag
    definition: >-
      A user-defined suffix appended to a namespace to form a unique email
      address ({namespace}.{tag}@inbox.testmail.app). Tags do not need to be
      pre-registered; any valid string sent to the namespace.tag address is
      accepted and routed. Tags enable test isolation by giving each test case
      a distinct inbox address.
    tags:
      - core
      - routing

  - term: programmable inbox
    definition: >-
      A dynamically-created email inbox within a Testmail namespace, addressed
      by a namespace.tag combination. Programmable inboxes do not require
      provisioning — they activate automatically upon receipt of the first
      email sent to a given namespace.tag address.
    tags:
      - core

  - term: livequery
    definition: >-
      A polling mechanism available on both the JSON API (livequery=true) and
      GraphQL API (livequery: true) that holds the request open until a
      matching email arrives. If no email arrives within 60 seconds, the server
      returns HTTP 307 and the client must follow the redirect and resend the
      request. Live queries are suitable for CI/CD pipelines that need to wait
      for a triggered email before proceeding.
    tags:
      - querying
      - ci-cd

  - term: tag_prefix
    definition: >-
      A query parameter supported by the JSON API (tag_prefix) that filters
      emails whose tag begins with the specified string. Useful for grouping
      test runs under a common tag prefix (e.g., tag_prefix=verify- returns all
      emails tagged verify-user1, verify-user2, etc.).
    tags:
      - filtering

  - term: spam_score
    definition: >-
      A numeric score produced by SpamAssassin representing the likelihood that
      an email is spam. Scores are typically floating-point numbers; the default
      SpamAssassin threshold is 5.0. Scores below 5 indicate the email is
      unlikely to be filtered; scores at or above 5 suggest the email may be
      blocked by spam filters. Available via spam_report=true on the JSON API or
      as a field selection in GraphQL.
    tags:
      - spam-testing

  - term: spam_report
    definition: >-
      A detailed text report generated by SpamAssassin describing which rules
      were triggered and their individual score contributions. Returned as a
      string when spam_report=true is set on the JSON API request. Useful for
      diagnosing deliverability issues in outgoing email content.
    tags:
      - spam-testing

  - term: advanced_filters
    definition: >-
      A GraphQL argument accepting an array of FilterInput objects that enables
      complex field-level email filtering beyond namespace and tag. Supports
      matching by from, to, subject, text, or html fields using exact, wildcard,
      or regex match types with include/exclude actions. Body fields (text/html)
      are limited to 30KB for search purposes.
    tags:
      - graphql
      - filtering

  - term: advanced_sorts
    definition: >-
      A GraphQL argument accepting an array of SortInput objects that specifies
      custom sort ordering for inbox query results. Supports sorting by tag,
      timestamp, subject, or from fields in ascending or descending order.
      Multiple sort inputs are supported for tie-breaking.
    tags:
      - graphql
      - sorting

  - term: email retention
    definition: >-
      The period for which emails are stored in a Testmail inbox before
      automatic deletion. Retention windows vary by pricing plan: 1 day on the
      free tier, 3 days on lower-tier plans, and 30 days on higher-tier plans.
      After the retention window expires, emails are permanently deleted.
    tags:
      - plans
      - data-management

  - term: API key
    definition: >-
      A credential obtained from the Testmail developer console that
      authenticates API requests and authorizes access to specific namespaces.
      Passed as the apikey query parameter in JSON API requests or as a Bearer
      token in the Authorization header for GraphQL API requests.
    tags:
      - authentication
      - security

  - term: inbox.testmail.app
    definition: >-
      The inbound SMTP domain for all Testmail programmable inboxes. Emails
      destined for testing are sent to addresses of the form
      {namespace}.{tag}@inbox.testmail.app and are retrievable via the JSON or
      GraphQL API.
    tags:
      - routing
      - infrastructure

  - term: timestamp_from / timestamp_to
    definition: >-
      Time-range filter parameters (in milliseconds since Unix epoch) available
      on both the JSON API and GraphQL API. When specified, only emails received
      within the inclusive time window are returned. Useful for narrowing results
      to a specific test run window.
    tags:
      - filtering
      - time
